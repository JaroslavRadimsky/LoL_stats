name: Deploy LoL dashboard

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Generate live stats when config and secret exist
        env:
          RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
        shell: bash
        run: |
          if [[ -n "$RIOT_API_KEY" && -f "config/players.json" ]] && ! grep -q "MojeRiotJmeno" config/players.json; then
            python -m lol_stats --config config/players.json --output docs/data/stats.json
          else
            echo "Using demo stats.json because RIOT_API_KEY or config/players.json is missing."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
